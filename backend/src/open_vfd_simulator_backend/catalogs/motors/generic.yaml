    manufacturer: "Generic"
    thumbnail: "thumbnails/generic_im_3ph_small.png"

    # IEC 60034-1 nameplate
    rated_power_kw: 0.55
    rated_voltage_v: 230.0
    rated_frequency_hz: 50.0
    rated_current_a: 3.5
    rated_speed_rpm: 1400
    power_factor: 0.74
    ip_protection: "IP55"
    thermal_class: "F"
    mounting: "B3"
