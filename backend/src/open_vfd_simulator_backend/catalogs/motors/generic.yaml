# Generic 3-phase induction motor catalog
#
# These are reference models based on typical IEC 60034-1 parameters for
# squirrel-cage induction motors. They are NOT tied to any real manufacturer.
# Use them as a starting point when no specific datasheet is available, or
# as templates when creating your own motor models.
#
# See docs/CATALOG_FORMAT.md for the full schema reference.

motors:

